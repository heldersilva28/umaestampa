<ion-header class="ion-no-border">
  <ion-toolbar class="help-modal-header">
    <ion-title class="ion-title">Ajuda e FAQs</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="closeModal()" aria-label="Fechar ajuda">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="help-modal-content">
  <!-- Tabs: FAQs / Tutoriais -->
  <ion-segment [value]="activeTab()" (ionChange)="onTabChange($event.detail.value)">
    <ion-segment-button value="faqs">
      <span>FAQs</span>
    </ion-segment-button>
    <ion-segment-button value="tutorials">
      <span>Tutoriais</span>
    </ion-segment-button>
  </ion-segment>

  <!-- FAQs Tab -->
  <div *ngIf="activeTab() === 'faqs'" class="tab-content">
    <!-- Search Bar -->
    <ion-searchbar
      placeholder="Pesquisar FAQs..."
      (ionInput)="onSearch($event.detail.value)"
      [value]="searchTerm()"
      class="faq-search"
    ></ion-searchbar>

    <!-- Results Count -->
    <div *ngIf="searchTerm()" class="search-info">
      {{ filteredFAQs().length }} resultado(s) encontrado(s)
    </div>

    <!-- FAQ List -->
    <ion-list class="faq-list">
      <ion-item
        *ngFor="let faq of filteredFAQs()"
        [class.faq-item-selected]="selectedFAQ()?.id === faq.id"
        (click)="selectFAQ(faq)"
        class="faq-item"
        button
        detail="false"
      >
        <div class="faq-item-content">
          <h3 class="faq-question">{{ faq.question }}</h3>
          <p
            *ngIf="selectedFAQ()?.id === faq.id"
            class="faq-answer"
          >
            {{ faq.answer }}
          </p>
        </div>
        <ion-icon
          name="chevron-down-outline"
          slot="end"
          class="faq-chevron"
          [class.faq-chevron-rotated]="selectedFAQ()?.id === faq.id"
        ></ion-icon>
      </ion-item>
    </ion-list>

    <!-- No Results -->
    <div *ngIf="filteredFAQs().length === 0" class="no-results">
      <ion-icon name="search-outline"></ion-icon>
      <p>Nenhuma FAQ encontrada</p>
    </div>
  </div>

  <!-- Tutorials Tab -->
  <div *ngIf="activeTab() === 'tutorials'" class="tab-content">
    <ion-list class="tutorials-list">
      <ion-item
        *ngFor="let tutorial of allTutorials()"
        [class.tutorial-item-selected]="selectedTutorial()?.id === tutorial.id"
        (click)="selectTutorial(tutorial)"
        class="tutorial-item"
        button
        detail="false"
      >
        <div class="tutorial-item-content">
          <h3 class="tutorial-title">{{ tutorial.title }}</h3>

          <!-- Tutorial Steps (when selected) -->
          <div
            *ngIf="selectedTutorial()?.id === tutorial.id"
            class="tutorial-steps"
          >
            <ol class="steps-list">
              <li *ngFor="let step of tutorial.steps" class="step-item">
                {{ step }}
              </li>
            </ol>
          </div>
        </div>
        <ion-icon
          name="chevron-down-outline"
          slot="end"
          class="tutorial-chevron"
          [class.tutorial-chevron-rotated]="selectedTutorial()?.id === tutorial.id"
        ></ion-icon>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
