<app-header></app-header>

<ion-content id="main-content">
  <div class="mx-auto max-w-5xl px-4 pb-8 pt-6">
    <div class="mb-6 text-center">
      <h1 class="mb-1 text-2xl font-bold text-foreground">Escolha o Seu Produto</h1>
      <p class="mx-auto max-w-md text-sm text-muted-foreground">
        Personalize qualquer artigo com as suas fotos favoritas.
      </p>
    </div>

    <div class="grid grid-cols-2 gap-4 md:grid-cols-3">
      <ion-card
        *ngFor="let product of products()"
        class="m-0 cursor-pointer overflow-hidden rounded-2xl shadow-sm"
        style="--background: var(--card);"
        tabindex="0"
        (click)="goToProduct(product)"
        (keyup.enter)="goToProduct(product)"
      >
        <div class="aspect-square w-full bg-input-background">
          <img
            [src]="product.image"
            [alt]="product.name"
            class="h-full w-full object-cover"
            loading="lazy"
          />
        </div>

        <ion-card-content class="p-3">
          <p class="mb-1 text-xs text-muted-foreground">{{ product.category }}</p>
          <h2 class="mb-1 text-sm font-semibold leading-tight text-foreground">
            {{ product.name }}
          </h2>
          <p class="mb-2 text-base font-bold text-brand-accent">
            €{{ product.price.toFixed(2) }}
          </p>

          <ion-button
            expand="block"
            size="small"
            class="primary-action catalog-action-btn"
            (click)="goToProduct(product); $event.stopPropagation()"
          >
            <ion-icon name="brush-outline" slot="start"></ion-icon>
            Personalizar
          </ion-button>
        </ion-card-content>
      </ion-card>
    </div>
  </div>
</ion-content>
