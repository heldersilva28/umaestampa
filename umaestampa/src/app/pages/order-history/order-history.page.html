<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/catalog" text="Voltar"></ion-back-button>
    </ion-buttons>
    <ion-title>Encomendas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="mx-auto max-w-3xl px-4 py-6">
    <div *ngIf="orders.length === 0" class="flex flex-col items-center py-20 text-center">
      <div class="mb-4 flex h-20 w-20 items-center justify-center rounded-full bg-gray-100">
        <ion-icon name="cube-outline" class="text-4xl text-gray-300"></ion-icon>
      </div>
      <h1 class="mb-2 text-xl font-bold text-gray-900">Sem Encomendas</h1>
      <p class="mb-6 text-sm text-gray-500">O histórico de encomendas aparecerá aqui.</p>
      <ion-button routerLink="/catalog" class="primary-action">
        Explorar Produtos
      </ion-button>
    </div>
  </div>
</ion-content>
