<ion-content fullscreen class="auth-content">
  <div class="auth-page">
    <button type="button" class="auth-back" routerLink="/catalog" aria-label="Voltar ao catálogo">
      <ion-icon name="arrow-back-outline"></ion-icon>
      <span>Catálogo</span>
    </button>

    <section class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-mark">
          <ion-icon name="color-palette-outline"></ion-icon>
        </div>
        <h1>UmaEstampa</h1>
        <p>A sua conta de personalização</p>
      </div>

      <ion-segment [(ngModel)]="activeTab" class="auth-segment">
        <ion-segment-button value="login">
          <ion-label>Entrar</ion-label>
        </ion-segment-button>
        <ion-segment-button value="register">
          <ion-label>Registar</ion-label>
        </ion-segment-button>
      </ion-segment>

      <div *ngIf="activeTab === 'login'" class="auth-fields">
        <label>
          <span>Email</span>
          <ion-item class="form-field" lines="none">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input type="email" placeholder="joao@exemplo.pt" [(ngModel)]="loginEmail" autocomplete="email"></ion-input>
          </ion-item>
        </label>

        <label>
          <span>Password</span>
          <ion-item class="form-field" lines="none">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              [type]="showPassword ? 'text' : 'password'"
              placeholder="A sua password"
              [(ngModel)]="loginPassword"
              autocomplete="current-password"
            ></ion-input>
            <ion-button fill="clear" slot="end" (click)="showPassword = !showPassword" aria-label="Mostrar password">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" slot="icon-only"></ion-icon>
            </ion-button>
          </ion-item>
        </label>

        <ion-button expand="block" class="primary-action auth-submit" [disabled]="isLoading" (click)="login()">
          <ion-spinner *ngIf="isLoading" name="crescent" slot="start"></ion-spinner>
          {{ isLoading ? 'A entrar...' : 'Entrar' }}
        </ion-button>
      </div>

      <div *ngIf="activeTab === 'register'" class="auth-fields">
        <label>
          <span>Nome completo</span>
          <ion-item class="form-field" lines="none">
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-input type="text" placeholder="João Silva" [(ngModel)]="registerName"></ion-input>
          </ion-item>
        </label>

        <label>
          <span>Email</span>
          <ion-item class="form-field" lines="none">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input type="email" placeholder="joao@exemplo.pt" [(ngModel)]="registerEmail" autocomplete="email"></ion-input>
          </ion-item>
        </label>

        <label>
          <span>Password</span>
          <ion-item class="form-field" lines="none">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Criar password"
              [(ngModel)]="registerPassword"
              autocomplete="new-password"
            ></ion-input>
          </ion-item>
        </label>

        <label>
          <span>Confirmar password</span>
          <ion-item class="form-field" lines="none">
            <ion-icon name="shield-checkmark-outline" slot="start"></ion-icon>
            <ion-input
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Repetir password"
              [(ngModel)]="registerConfirmPassword"
              autocomplete="new-password"
            ></ion-input>
            <ion-button fill="clear" slot="end" (click)="showPassword = !showPassword" aria-label="Mostrar password">
              <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" slot="icon-only"></ion-icon>
            </ion-button>
          </ion-item>
        </label>

        <ion-button expand="block" class="primary-action auth-submit" [disabled]="isLoading" (click)="register()">
          <ion-spinner *ngIf="isLoading" name="crescent" slot="start"></ion-spinner>
          {{ isLoading ? 'A criar conta...' : 'Criar Conta' }}
        </ion-button>
      </div>

      <ion-button fill="clear" expand="block" routerLink="/order-history" class="auth-history">
        <ion-icon name="cube-outline" slot="start"></ion-icon>
        Histórico de Encomendas
      </ion-button>
    </section>
  </div>
</ion-content>
